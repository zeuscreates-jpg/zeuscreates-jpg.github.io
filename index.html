<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: black;
            color: teal;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding: 50px;
        }
        h1 { 
            text-transform: uppercase; 
            letter-spacing: 5px;
            color: teal;
            text-shadow: 0 0 10px teal, 0 0 20px teal; /* This adds the highlight/glow effect */
            border-bottom: 2px solid teal;
            display: inline-block;
            padding-bottom: 10px;
        }
        .product-card {
            border: 2px solid teal;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            background: #111;
        }
    </style>
</head>
<body>
    <h1>Zeus Creates</h1>
    <div class="product-card">
        <h3>Product Name</h3>
        <p>A short description of your vintage product goes here.</p>
    </div>
</body>
</html>
