<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zeus Creates</title>
    <style>
        body { background-color: black; color: #008080; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        h1 { color: #008080; text-shadow: 0 0 10px #008080; border-bottom: 2px solid #008080; display: inline-block; padding-bottom: 10px; text-transform: uppercase; }
        .product-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-top: 50px; }
        .product-card { border: 2px solid #008080; padding: 20px; width: 280px; background: #0a0a0a; }
        img { width: 100%; height: 200px; object-fit: cover; border: 1px solid #008080; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Zeus Creates</h1>
    <div class="product-container">
        <div class="product-card">
            <img src="actionfigure.jpg" alt="Anime Figure">
            <h3>Anime Figure</h3>
        </div>
        <div class="product-card">
            <img src="keyboard.jpg" alt="Custom Keyboard">
            <h3>Custom Keyboard</h3>
        </div>
    </div>
</body>
</html>
